<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer dark blue border -->
  <circle cx="100" cy="100" r="98" fill="#1a3d8f"/>
  <!-- Main blue background -->
  <circle cx="100" cy="100" r="90" fill="#1e6bbf"/>

  <!-- Hebrew text top: מרכזי הטניס -->
  <path id="topArc" d="M 25,100 A 75,75 0 0,1 175,100" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">
    <textPath href="#topArc" startOffset="50%">מרכזי הטניס</textPath>
  </text>

  <!-- Hebrew text bottom: והחינוך בישראל -->
  <path id="bottomArc" d="M 20,105 A 80,80 0 0,0 180,105" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">
    <textPath href="#bottomArc" startOffset="50%">והחינוך בישראל</textPath>
  </text>

  <!-- Tennis racket - yellow, tilted -->
  <g transform="translate(100,95) rotate(-15)">
    <!-- Racket head outline -->
    <ellipse cx="0" cy="-22" rx="22" ry="27" fill="none" stroke="#f5c800" stroke-width="6"/>
    <!-- Racket strings horizontal -->
    <line x1="-20" y1="-22" x2="20" y2="-22" stroke="#f5c800" stroke-width="1.5" opacity="0.8"/>
    <line x1="-21" y1="-14" x2="21" y2="-14" stroke="#f5c800" stroke-width="1.5" opacity="0.8"/>
    <line x1="-22" y1="-6" x2="22" y2="-6" stroke="#f5c800" stroke-width="1.5" opacity="0.8"/>
    <line x1="-21" y1="2" x2="21" y2="2" stroke="#f5c800" stroke-width="1.5" opacity="0.8"/>
    <line x1="-19" y1="10" x2="19" y2="10" stroke="#f5c800" stroke-width="1.5" opacity="0.8"/>
    <!-- Racket strings vertical -->
    <line x1="-14" y1="-48" x2="-14" y2="4" stroke="#f5c800" stroke-width="1.5" opacity="0.8"/>
    <line x1="-7" y1="-49" x2="-7" y2="5" stroke="#f5c800" stroke-width="1.5" opacity="0.8"/>
    <line x1="0" y1="-49" x2="0" y2="5" stroke="#f5c800" stroke-width="1.5" opacity="0.8"/>
    <line x1="7" y1="-49" x2="7" y2="5" stroke="#f5c800" stroke-width="1.5" opacity="0.8"/>
    <line x1="14" y1="-48" x2="14" y2="4" stroke="#f5c800" stroke-width="1.5" opacity="0.8"/>
    <!-- Racket throat -->
    <path d="M -10,5 L -5,20 L 5,20 L 10,5" fill="#f5c800" stroke="#f5c800" stroke-width="1"/>
    <!-- Racket handle -->
    <rect x="-5" y="20" width="10" height="38" rx="3" fill="#f5c800"/>
    <!-- Handle grip wrap lines -->
    <line x1="-5" y1="28" x2="5" y2="28" stroke="#e6b800" stroke-width="1.5"/>
    <line x1="-5" y1="35" x2="5" y2="35" stroke="#e6b800" stroke-width="1.5"/>
    <line x1="-5" y1="42" x2="5" y2="42" stroke="#e6b800" stroke-width="1.5"/>
    <line x1="-5" y1="49" x2="5" y2="49" stroke="#e6b800" stroke-width="1.5"/>
  </g>

  <!-- Tennis ball - white circle near racket head -->
  <circle cx="125" cy="68" r="11" fill="white"/>
  <!-- Tennis ball seam lines -->
  <path d="M 116,65 Q 125,60 134,65" fill="none" stroke="#cccccc" stroke-width="1.5"/>
  <path d="M 116,71 Q 125,76 134,71" fill="none" stroke="#cccccc" stroke-width="1.5"/>
</svg>
