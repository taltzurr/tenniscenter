<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 200 200">
  <defs>
    <clipPath id="c"><circle cx="100" cy="100" r="90"/></clipPath>
    <path id="t1" d="M30,62 A72,72,0,0,1,170,62"/>
    <path id="t2" d="M170,148 A72,72,0,0,1,30,148"/>
  </defs>

  <!-- Background -->
  <circle cx="100" cy="100" r="99" fill="#0f3b8c"/>
  <circle cx="100" cy="100" r="90" fill="#1565c0"/>

  <!-- Racket (yellow, slightly rotated) -->
  <g transform="translate(90,100) rotate(-20)" clip-path="url(#c)">
    <ellipse cx="0" cy="-25" rx="22" ry="27" fill="none" stroke="#f9c900" stroke-width="7" stroke-linejoin="round"/>
    <!-- Horizontal strings -->
    <line x1="-20" y1="-36" x2="20" y2="-36" stroke="#f9c900" stroke-width="1.3"/>
    <line x1="-22" y1="-25" x2="22" y2="-25" stroke="#f9c900" stroke-width="1.3"/>
    <line x1="-22" y1="-14" x2="22" y2="-14" stroke="#f9c900" stroke-width="1.3"/>
    <line x1="-21" y1="-3"  x2="21" y2="-3"  stroke="#f9c900" stroke-width="1.3"/>
    <!-- Vertical strings -->
    <line x1="-14" y1="-52" x2="-14" y2="2" stroke="#f9c900" stroke-width="1.3"/>
    <line x1="-7"  y1="-52" x2="-7"  y2="2" stroke="#f9c900" stroke-width="1.3"/>
    <line x1="0"   y1="-52" x2="0"   y2="2" stroke="#f9c900" stroke-width="1.3"/>
    <line x1="7"   y1="-52" x2="7"   y2="2" stroke="#f9c900" stroke-width="1.3"/>
    <line x1="14"  y1="-52" x2="14"  y2="2" stroke="#f9c900" stroke-width="1.3"/>
    <!-- Throat + handle -->
    <path d="M-10,2 Q0,16 10,2" fill="#f9c900"/>
    <rect x="-5" y="15" width="10" height="40" rx="3" fill="#f9c900"/>
  </g>

  <!-- Tennis ball -->
  <circle cx="126" cy="62" r="13" fill="white"/>
  <path d="M114,59 Q126,52 138,59" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <path d="M114,65 Q126,72 138,65" fill="none" stroke="#ccc" stroke-width="1.5"/>

  <!-- Top text -->
  <text font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="white">
    <textPath xlink:href="#t1" startOffset="50%" text-anchor="middle">מרכזי הטניס</textPath>
  </text>

  <!-- Bottom text -->
  <text font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">
    <textPath xlink:href="#t2" startOffset="50%" text-anchor="middle">והחינוך בישראל</textPath>
  </text>
</svg>
