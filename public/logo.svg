<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="90"/>
    </clipPath>
    <path id="topTextPath" d="M 28,100 A 72,72 0 0,1 172,100"/>
    <path id="bottomTextPath" d="M 172,108 A 75,75 0 0,1 28,108"/>
  </defs>

  <!-- Outer dark blue border -->
  <circle cx="100" cy="100" r="98" fill="#1a3d8f"/>
  <!-- Main blue background -->
  <circle cx="100" cy="100" r="90" fill="#1e6bbf"/>

  <!-- Tennis racket (yellow, tilted ~15deg clockwise) -->
  <g transform="translate(95,105) rotate(15)" clip-path="url(#circleClip)">
    <!-- Racket head frame -->
    <ellipse cx="0" cy="-28" rx="23" ry="28" fill="none" stroke="#f5c800" stroke-width="7"/>
    <!-- Strings horizontal -->
    <line x1="-21" y1="-38" x2="21" y2="-38" stroke="#f5c800" stroke-width="1.2"/>
    <line x1="-23" y1="-28" x2="23" y2="-28" stroke="#f5c800" stroke-width="1.2"/>
    <line x1="-23" y1="-18" x2="23" y2="-18" stroke="#f5c800" stroke-width="1.2"/>
    <line x1="-22" y1="-8" x2="22" y2="-8" stroke="#f5c800" stroke-width="1.2"/>
    <line x1="-20" y1="2" x2="20" y2="2" stroke="#f5c800" stroke-width="1.2"/>
    <!-- Strings vertical -->
    <line x1="-16" y1="-56" x2="-16" y2="0" stroke="#f5c800" stroke-width="1.2"/>
    <line x1="-8" y1="-56" x2="-8" y2="0" stroke="#f5c800" stroke-width="1.2"/>
    <line x1="0" y1="-56" x2="0" y2="0" stroke="#f5c800" stroke-width="1.2"/>
    <line x1="8" y1="-56" x2="8" y2="0" stroke="#f5c800" stroke-width="1.2"/>
    <line x1="16" y1="-56" x2="16" y2="0" stroke="#f5c800" stroke-width="1.2"/>
    <!-- Throat -->
    <path d="M -10,0 Q -6,14 0,16 Q 6,14 10,0" fill="#f5c800"/>
    <!-- Handle -->
    <rect x="-5.5" y="16" width="11" height="42" rx="3" fill="#f5c800"/>
  </g>

  <!-- Tennis ball (white) -->
  <circle cx="127" cy="65" r="13" fill="white"/>
  <path d="M 116,62 Q 127,56 138,62" fill="none" stroke="#ddd" stroke-width="1.5"/>
  <path d="M 116,68 Q 127,74 138,68" fill="none" stroke="#ddd" stroke-width="1.5"/>

  <!-- Top text: מרכזי הטניס -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="bold" fill="white">
    <textPath xlink:href="#topTextPath" startOffset="50%" text-anchor="middle">מרכזי הטניס</textPath>
  </text>

  <!-- Bottom text: והחינוך בישראל -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="white">
    <textPath xlink:href="#bottomTextPath" startOffset="50%" text-anchor="middle">והחינוך בישראל</textPath>
  </text>
</svg>
