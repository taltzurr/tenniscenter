<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Outer circle - dark blue -->
  <circle cx="100" cy="100" r="98" fill="#1a5f7a"/>

  <!-- Inner circle - light blue -->
  <circle cx="100" cy="100" r="85" fill="#2196F3"/>

  <!-- Tennis racket handle -->
  <rect x="93" y="115" width="14" height="50" rx="3" fill="#1a5f7a"/>

  <!-- Tennis racket head -->
  <ellipse cx="100" cy="85" rx="35" ry="45" fill="none" stroke="#f9dc5c" stroke-width="8"/>

  <!-- Tennis racket strings - vertical -->
  <line x1="85" y1="50" x2="85" y2="120" stroke="#f9dc5c" stroke-width="2"/>
  <line x1="95" y1="45" x2="95" y2="125" stroke="#f9dc5c" stroke-width="2"/>
  <line x1="105" y1="45" x2="105" y2="125" stroke="#f9dc5c" stroke-width="2"/>
  <line x1="115" y1="50" x2="115" y2="120" stroke="#f9dc5c" stroke-width="2"/>

  <!-- Tennis racket strings - horizontal -->
  <line x1="68" y1="65" x2="132" y2="65" stroke="#f9dc5c" stroke-width="2"/>
  <line x1="66" y1="80" x2="134" y2="80" stroke="#f9dc5c" stroke-width="2"/>
  <line x1="66" y1="95" x2="134" y2="95" stroke="#f9dc5c" stroke-width="2"/>
  <line x1="68" y1="110" x2="132" y2="110" stroke="#f9dc5c" stroke-width="2"/>

  <!-- Text arc - top -->
  <defs>
    <path id="textPathTop" d="M 30,100 A 70,70 0 0 1 170,100" fill="none"/>
    <path id="textPathBottom" d="M 170,100 A 70,70 0 0 1 30,100" fill="none"/>
  </defs>

  <text fill="white" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
    <textPath href="#textPathTop" startOffset="50%" text-anchor="middle">מרכזי הטניס</textPath>
  </text>

  <text fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">
    <textPath href="#textPathBottom" startOffset="50%" text-anchor="middle">והתנועה בישראל</textPath>
  </text>
</svg>
